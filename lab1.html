<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Перевірка логіну</title>
</head>
<body>

<h2>Перевірка логіну і пароля</h2>
<button onclick="checkLogin()">Запустити</button>

<script>
function checkLogin() {
    let login = prompt("Введіть логін:");

    if (login === "Admin") {

        let password = prompt("Введіть пароль:");

        if (password === "Господар") {
            alert("Ласкаво просимо!");
        } else {
            if (password === "" || password === null) {
                alert("Скасовано");
            } else {
                alert("Неправильний пароль");
            }
        }

    } else {
        if (login === "" || login === null) {
            alert("Скасовано");
        } else {
            alert("Я вас не знаю");
        }
    }
}
</script>

</body>
</html>
